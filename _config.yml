title: Broadcom Mainframe Solutions
description: >-
  A catalog of Broadcom solutions that integrate with the Zowe API Mediation Layer
  or provide a VS Code extension for mainframe development.
baseurl: "/broadcom-solutions-site"
url: "https://balhar-jakub.github.io"

# No theme — fully custom layouts
# theme: minima

collections:
  solutions:
    output: true
    permalink: /solutions/:name/

defaults:
  - scope:
      path: ""
      type: "solutions"
    values:
      layout: "solution"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/
